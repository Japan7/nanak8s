environments:
  default:
    secrets:
      - ../globals.sops.yaml
      - default.sops.yaml
---
releases:
  - name: jellyswarrm
    chart: ../../charts/jellyswarrm
    values:
      - image:
          repository: ghcr.io/llukas22/jellyswarrm
          tag: main@sha256:50840920429d55097569023f66addfac24a59b7d29fca8b42c8b925dc33a52da # renovate
      - updateStrategy:
          type: Recreate
      - admin:
          username: "{{ .Values.jellyswarrm.admin.username }}"
          password: "{{ .Values.jellyswarrm.admin.password }}"
      - ingress:
          host: jellyfin.{{ .Values.domain }}
          annotations:
            traefik.ingress.kubernetes.io/router.entrypoints: websecure
            # traefik.ingress.kubernetes.io/router.middlewares: "{{ .Values.traefik.namespace }}-compress@kubernetescrd"
            cert-manager.io/cluster-issuer: letsencrypt
