environments:
  default:
    secrets:
      - ../globals.sops.yaml
      - default.sops.yaml
---
releases:
  - name: jellyswarrm
    chart: ../../charts/jellyswarrm
    values:
      - image:
          repository: ghcr.io/llukas22/jellyswarrm
          tag: main@sha256:a40fc8e6b6c16bf68e204e335819e270aa17655562003c4f4a18fb5da4018880 # renovate
      - updateStrategy:
          type: Recreate
      - admin:
          username: "{{ .Values.jellyswarrm.admin.username }}"
          password: "{{ .Values.jellyswarrm.admin.password }}"
      - ingress:
          host: jellyfin.{{ .Values.domain }}
          annotations:
            traefik.ingress.kubernetes.io/router.entrypoints: websecure
            cert-manager.io/cluster-issuer: letsencrypt
