environments:
  default:
    secrets:
      - ../globals.sops.yaml
      - default.sops.yaml
---
releases:
  - name: jeanjeangpt
    chart: ../../charts/llama-server
    values:
      - nodeSelector:
          feature/llm: "true"
      - s3:
          hostname: "{{ .Values.s3.hostname }}"
          region: "{{ .Values.s3.region }}"
          accessKey: "{{ .Values.s3.accessKey }}"
          secretKey: "{{ .Values.s3.secretKey }}"
          modelDir: tmpdir/Qwen3.5-4B-finetune-gguf
      - llama:
          modelPath: Qwen3.5-4B.Q4_K_M.gguf
          # mmprojPath: Qwen3.5-4B.BF16-mmproj.gguf
          serverArgs: --ctx-size 8192 --no-repack --parallel 1 --reasoning off --temperature 0.7 --top-p 0.8 --top-k 20 --min-p 0.0 --repeat-penalty 1.0 --presence-penalty 1.5
