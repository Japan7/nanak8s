environments:
  default:
    secrets:
      - ../globals.sops.yaml
      - default.sops.yaml
---
releases:
  - name: waicolle
    chart: ../../charts/waicolle
    values:
      - nanapi:
          url: http://nanapi-prod.nanapi:8000
          username: "{{ .Values.waicolle.nanapi.username }}"
          password: "{{ .Values.waicolle.nanapi.password }}"
      - defaultClientId: "{{ .Values.waicolle.defaultClientId }}"
      - ingress:
          host: waicolle.{{ .Values.domain }}
          annotations:
            traefik.ingress.kubernetes.io/router.entrypoints: websecure
            traefik.ingress.kubernetes.io/router.middlewares: "{{ .Values.traefik.namespace }}-compress@kubernetescrd"
            cert-manager.io/cluster-issuer: letsencrypt
  - name: waiventure
    chart: ../../charts/waiventure
    values:
      - updateStrategy:
          type: Recreate
      - config: |
          {{ .Values.waiventure.config | nindent 10 }}
      - ingress:
          host: waiventure.{{ .Values.domain }}
          annotations:
            traefik.ingress.kubernetes.io/router.entrypoints: websecure
            traefik.ingress.kubernetes.io/router.middlewares: "{{ .Values.traefik.namespace }}-compress@kubernetescrd"
            cert-manager.io/cluster-issuer: letsencrypt
