apiVersion: v1
kind: Secret
metadata:
  name: "{{ .Release.Name }}-env"
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
stringData:
  S3_HOSTNAME: {{ .Values.s3.hostname }}
  S3_REGION: {{ .Values.s3.region }}
  S3_ACCESS_KEY: {{ .Values.s3.accessKey }}
  S3_SECRET_KEY: {{ .Values.s3.secretKey }}
  S3_MODEL_DIR: {{ .Values.s3.modelDir }}
  MODEL_PATH: {{ .Values.llama.modelPath }}
  {{ if .Values.llama.mmprojPath}}
  MMPROJ_PATH: {{ .Values.llama.mmprojPath }}
  {{ end }}
