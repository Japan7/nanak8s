apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: garage-proxy
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    traefik.ingress.kubernetes.io/router.middlewares: {{ .Release.Namespace }}-garage-proxy-cors@kubernetescrd{{ with .Values.ingress.extraTraefikMiddlewares }},{{ join "," . }}{{ end }}
spec:
  rules:
    - host: "{{ .Values.ingress.host }}"
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: garage-proxy
                port:
                  number: 3900
  tls:
    - hosts:
        - "{{ .Values.ingress.host }}"
      secretName: "{{ .Values.ingress.host }}-tls"
