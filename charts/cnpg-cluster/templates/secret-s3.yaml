{{- if .Values.backups.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: "{{ .Release.Name }}-s3"
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
type: Opaque
stringData:
  username: "{{ .Values.backups.s3.accessKey }}"
  password: "{{ .Values.backups.s3.secretKey }}"
  region: "{{ .Values.backups.s3.region }}"
{{- end }}
