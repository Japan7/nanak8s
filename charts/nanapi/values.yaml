image:
  repository: ghcr.io/japan7/nanapi
  tag: latest
  pullPolicy: ""
  pullSecrets: []

replicaCount: 1

affinity: {}

gel:
  service: ""
  username: ""
  password: ""
  database: ""

localSettings: ""

tasks:
  enabled: true
  anilist:
    schedule: "0 2 * * *"
    resources:
      requests:
        memory: 4Gi
  userlists:
    schedule: "0 */6 * * *"
    resources:
      requests:
        memory: 2Gi
  meilisearch:
    schedule: "@hourly"
  discord:
    schedule: "0 3 * * *"
    clientId: ""
    guildId: ""
    nanachanUserId: ""
  ai:
    schedule: "0 5 * * *"

resources:
  requests:
    memory: 4Gi

ingress:
  host: ""
  pathPrefix: "/"
  annotations: {}
  extraTraefikMiddlewares: []
